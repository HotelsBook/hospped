name: Build and Deploy Hospped

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ⚠️ CORREÇÃO 1: 'contents: write' é obrigatório para criar a branch gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build site
        run: pelican content -o output -s pelicanconf.py
        env:
          PELICAN_ENV: production
      
      - name: Validate output
        run: |
          if [ ! -d "output" ] || [ -z "$(ls -A output)" ]; then
            echo "Output vazio"
            exit 1
          fi
          echo "Build gerado com sucesso"
          ls -la output
      
      # ⚠️ CORREÇÃO 2: Ação que força a criação da branch gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          force_orphan: true